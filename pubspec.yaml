name: shopping
description: "PreLoved — marketplace jual beli barang bekas & preloved."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.3.3
  share_plus: ^10.1.4
  permission_handler: ^11.4.0
  geolocator: ^13.0.4
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.2
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  go_router: ^14.0.0
  provider: ^6.0.5
  image_picker: ^1.2.2
  image: ^4.5.3
  firebase_core: ^3.6.0
  firebase_database: ^11.1.4
  firebase_storage: ^12.3.0
  cloud_firestore: ^5.4.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.1
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/icon/app_icon.png
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/
